<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Horizon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Poppins:wght@600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      /* Slate 900 */
      color: #e2e8f0;
      /* Slate 200 */
      overflow: hidden;
      /* App handles scrolling */
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Custom scrollbar for webkit */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Main page staggered reveal animations */
    .main-page-header {
      opacity: 0;
    }
    .main-page-graph {
      opacity: 0;
    }
    .main-page-legend {
      opacity: 0;
    }
    .app-revealed .main-page-header {
      animation: mainHeaderReveal 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }
    .app-revealed .main-page-graph {
      animation: mainGraphReveal 0.85s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
    }
    .app-revealed .main-page-legend {
      animation: mainLegendReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }
    @keyframes mainHeaderReveal {
      from {
        opacity: 0;
        transform: translateY(-14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes mainGraphReveal {
      from {
        opacity: 0;
        transform: scale(0.985);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    @keyframes mainLegendReveal {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 0.9;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
